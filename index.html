<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #1e1e1e;
  color: #4B6F8A;
  font-family: Helvetica, Arial, sans-serif;
  min-height: 100vh;
}

.page {
  padding: 48px;
}

.logo {
  display: block;
  width: min(38vw, 520px);
  margin-bottom: 48px;
}

.track-box {
  border: 5px solid #4B6F8A;
  padding: 56px 76px;
  width: min(100%, 1440px);
  min-height: auto;
}

.track {
  display: grid;
  grid-template-columns: 55px 1fr;
  gap: 12px;
  font-size: clamp(1.5rem, 3.2vw, 3.9rem);
  line-height: 1.35;
  letter-spacing: 0.08em;
  font-weight: 700;
  color: #4B6F8A;
  cursor: default;
}

.number {
  opacity: 0.95;
  font-size: 0.3em;
  align-self: center;
}

.title {
  white-space: nowrap;
  overflow-wrap: anywhere;
}

@media (max-width: 800px) {
  .page {
    padding: 26px;
  }

  .logo {
    width: 100%;
    max-width: none;
    margin-bottom: 28px;
  }

  .track-box {
    border-width: 3px;
    padding: 28px 24px;
  }

  .track {
    grid-template-columns: 38px 1fr;
    gap: 8px;
    font-size: clamp(1rem, 4.8vw, 2.1rem);
    letter-spacing: 0.04em;
  }

  .title {
    white-space: normal;
    overflow-wrap: anywhere;
  }
}

@media screen and (max-width: 900px) {
  .track {
    display: block !important;
  }

  .track .number {
    display: none !important;
  }

  .track .title {
    display: block !important;
  }
}


.footer-note {
  width: min(100%, 1440px);
  margin-top: 48px;
  text-align: right;
  color: #4B6F8A;
  font-size: 12px;
  letter-spacing: 0.25em;
}

@media (max-width: 900px) {
  .footer-note {
    margin-top: 28px;
    font-size: 11px;
  }
}

</style>
</head>
