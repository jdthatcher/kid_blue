<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="coming 26626">
<title>kid_blue</title>
<link rel="icon" type="image/png" href="ico.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #1e1e1e;
  color: #4B6F8A;
  font-family: Helvetica, Arial, sans-serif;
  min-height: 100vh;
}

.page {
  padding: 48px;
}

.logo {
  display: block;
  width: min(38vw, 520px);
  margin-bottom: 48px;
  cursor: pointer;
  opacity: 0;
  animation: logoReveal 0.6s ease forwards;
}

.track-box {
  border: 5px solid #4B6F8A;
  padding: 56px 76px;
  width: min(100%, 1440px);
  opacity: 0;
  animation: contentReveal 0.8s ease forwards;
  animation-delay: 1s;
}

.track {
  display: grid;
  grid-template-columns: 55px 1fr;
  gap: 12px;
  font-size: clamp(1.5rem, 3.2vw, 3.9rem);
  line-height: 1.35;
  letter-spacing: 0.08em;
  font-weight: 700;
  color: #4B6F8A;
  cursor: default;
}

.number {
  opacity: 0.95;
  font-size: 0.3em;
  align-self: center;
}

.title {
  white-space: nowrap;
  overflow-wrap: anywhere;
}

.footer-note {
  width: min(100%, 1440px);
  margin-top: 48px;
  text-align: right;
  color: #4B6F8A;
  font-size: 12px;
  letter-spacing: 0.25em;
  opacity: 0;
  animation: footerReveal 0.8s ease forwards;
  animation-delay: 1.8s;
}

@media (max-width: 900px) {
  .track {
    display: block;
  }

  .track .number {
    display: none;
  }

  .track .title {
    display: block;
  }

  .footer-note {
    margin-top: 28px;
    font-size: 11px;
  }
}

@media (max-width: 800px) {
  .page {
    padding: 26px;
  }

  .logo {
    width: 100%;
    max-width: none;
    margin-bottom: 28px;
  }

  .track-box {
    border-width: 3px;
    padding: 28px 24px;
  }

  .track {
    font-size: clamp(1rem, 4.8vw, 2.1rem);
    letter-spacing: 0.04em;
  }

  .title {
    white-space: normal;
  }
}

@keyframes logoReveal {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes contentReveal {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes footerReveal {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
</head>

<body>

<main class="page">
  <a href="https://open.spotify.com/album/0lxahfJTZNRPjF5NgTnVJU?si=bzmUeT3bTGq-Z6i50tTDmw" target="_blank" rel="noopener noreferrer">
    <img class="logo" src="kidblue_final.png" alt="kid_blue">
  </a>

  <section class="track-box" aria-label="Track list">
    <div class="track"><span class="number">01.</span><span class="title">bloodbath</span></div>
    <div class="track"><span class="number">02.</span><span class="title">take me out</span></div>
    <div class="track"><span class="number">03.</span><span class="title">love song</span></div>
    <div class="track"><span class="number">04.</span><span class="title">teleprompter</span></div>
    <div class="track"><span class="number">05.</span><span class="title">don't associate me with them</span></div>
    <div class="track"><span class="number">06.</span><span class="title">fate (interlude)</span></div>
    <div class="track"><span class="number">07.</span><span class="title">together again</span></div>
    <div class="track"><span class="number">08.</span><span class="title">don't you like me around?</span></div>
    <div class="track"><span class="number">09.</span><span class="title">can you hear it</span></div>
    <div class="track"><span class="number">10.</span><span class="title">i know you</span></div>
  </section>

  <div class="footer-note">coming 26626</div>
</main>

<script>
function filenameVersion(text) {
  return text
    .toLowerCase()
    .replace(/[()'".,!?]/g, "")
    .trim()
    .replace(/\s+/g, "_");
}

document.querySelectorAll(".title").forEach(title => {
  const original = title.textContent;
  const isMobile = window.matchMedia("(max-width: 700px)").matches;

  const hoverText =
    original === "bloodbath"
      ? "_bloodbath"
      : original === "teleprompter"
      ? "_teleprompter"
      : original === "don't associate me with them" && isMobile
      ? "dont_associate"
      : filenameVersion(original);

  title.addEventListener("mouseenter", () => {
    title.textContent = hoverText;
  });

  title.addEventListener("mouseleave", () => {
    title.textContent = original;
  });
});
</script>

</body>
</html>
